<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Timer">
<meta name="theme-color" content="#0d0f0e">
<title>Timer</title>

<link rel="icon" href="./icon.svg">
<link rel="manifest" href="./manifest.json">

<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@300;400;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0f0e;
    --text: #e8f5e9;
    --muted: #4a6a52;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: safe center;
    gap: clamp(4px, 3dvh, 40px);
    overflow-y: auto;
    overflow-x: hidden;
    position: relative;
    /* safe area for notch/home bar */
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    user-select: none;
    -webkit-user-select: none;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 60% 50% at 50% 50%, #0d2a1a 0%, #0d0f0e 70%);
    pointer-events: none;
  }

  .title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3rem, 8vw, 6rem);
    letter-spacing: 0.1em;
    color: var(--text);
    opacity: 0.9;
    position: relative;
    z-index: 1;
    text-shadow: 0 0 40px rgba(74, 222, 128, 0.15);
  }

  .timer-container {
    position: relative;
    z-index: 1;
    width: min(700px, 90vw);
    display: flex;
    flex-direction: column;
    gap: clamp(8px, 2.5dvh, 24px);
  }

  /* ── Status badge ── */
  .status-row {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 5px 16px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    border: 1px solid;
    transition: color 0.4s, border-color 0.4s, background 0.4s;
  }

  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    transition: background 0.4s, box-shadow 0.4s;
  }

  .status-badge.ready   { color: #4ade80; border-color: rgba(74,222,128,0.3);  background: rgba(74,222,128,0.05); }
  .status-badge.working { color: #93c5fd; border-color: rgba(147,197,253,0.3); background: rgba(147,197,253,0.05); }
  .status-badge.rest    { color: #fbbf24; border-color: rgba(251,191,36,0.3);  background: rgba(251,191,36,0.05); }

  .status-badge.ready   .status-dot { background: #4ade80; box-shadow: 0 0 6px #4ade80; }
  .status-badge.working .status-dot { background: #93c5fd; box-shadow: 0 0 6px #93c5fd; animation: blink 1s ease-in-out infinite; }
  .status-badge.rest    .status-dot { background: #fbbf24; box-shadow: 0 0 6px #fbbf24; animation: blink 1.5s ease-in-out infinite; }

  @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.25;} }

  /* ── Bar ── */
  .bar-wrapper {
    display: flex;
    align-items: stretch;
    height: clamp(36px, 7dvh, 72px);
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 0 0 1px rgba(74,222,128,0.1), 0 8px 32px rgba(0,0,0,0.4);
  }

  .segment { position: relative; overflow: hidden; }
  .segment-20 { flex: 20; border-right: 2px solid rgba(0,0,0,0.4); }
  .segment-70 { flex: 70; }

  .seg-bg { position: absolute; inset: 0; }
  .segment-20 .seg-bg { background: #14532d; }
  .segment-70 .seg-bg { background: #166534; }

  .seg-fill { position: absolute; inset: 0; width: 0%; }
  .seg-fill.blue-20  { background: linear-gradient(90deg, #1e3a8a, #1d4ed8); }
  .seg-fill.blue-70  { background: linear-gradient(90deg, #1e40af, #3b82f6); }
  .seg-fill.amber-20 { background: linear-gradient(90deg, #78350f, #d97706); }
  .seg-fill.amber-70 { background: linear-gradient(90deg, #92400e, #f59e0b); }

  .seg-fill::after {
    content: '';
    position: absolute;
    top:0; right:0; bottom:0; width: 24px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15));
    opacity: 0; transition: opacity 0.3s;
  }
  .seg-fill.active::after { opacity: 1; }

  /* ── Bar labels ── */
  .bar-labels { display:flex; width:100%; }
  .label-20 { flex:20; display:flex; gap:8px; align-items:center; white-space:nowrap; overflow:hidden; }
  .label-70 { flex:70; display:flex; gap:8px; align-items:center; justify-content:flex-end; white-space:nowrap; overflow:hidden; }
  .label-text { font-size:11px; letter-spacing:0.15em; text-transform:uppercase; color:var(--muted); }
  .label-time { font-size:13px; font-weight:600; color:#4ade80; }

  /* ── Time display ── */
  .time-display {
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .time-main {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(5rem, 15vw, 10rem);
    line-height: 1;
    letter-spacing: 0.05em;
    color: var(--text);
    transition: color 0.4s, text-shadow 0.4s;
    text-shadow: 0 0 60px rgba(74,222,128,0.1);
  }
  .time-main.working { color:#93c5fd; text-shadow:0 0 60px rgba(96,165,250,0.2); }
  .time-main.rest    { color:#fcd34d; text-shadow:0 0 60px rgba(251,191,36,0.2); }

  .time-phase {
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--muted);
    height: 16px;
  }

  /* ── Buttons ── */
  .btn-row {
    position: relative;
    z-index: 1;
    display: flex;
    gap: 16px;
    align-items: center;
    justify-content: center;
  }

  .btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 12px 28px;
    border-radius: 6px;
    border: 1px solid;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: opacity 0.25s, transform 0.15s, background 0.3s, color 0.3s, border-color 0.3s, box-shadow 0.3s;
    -webkit-tap-highlight-color: transparent;
    outline: none;
  }

  .btn:active { transform: scale(0.96); }

  .btn-key {
    font-size: 9px;
    padding: 1px 5px;
    border: 1px solid currentColor;
    border-radius: 3px;
    opacity: 0.6;
    letter-spacing: 0.05em;
  }

  /* START button — green */
  .btn-start {
    color: #4ade80;
    border-color: rgba(74,222,128,0.4);
    background: rgba(74,222,128,0.08);
  }
  .btn-start:hover { background: rgba(74,222,128,0.15); box-shadow: 0 0 16px rgba(74,222,128,0.15); }
  .btn-start:disabled { opacity: 0.2; cursor: default; transform: none; }

  /* REST button — amber */
  .btn-rest {
    color: #fbbf24;
    border-color: rgba(251,191,36,0.4);
    background: rgba(251,191,36,0.08);
  }
  .btn-rest:hover { background: rgba(251,191,36,0.15); box-shadow: 0 0 16px rgba(251,191,36,0.15); }
  .btn-rest:disabled { opacity: 0.2; cursor: default; transform: none; }

  /* When rest is "cancel rest" mode */
  .btn-rest.cancel {
    color: #f87171;
    border-color: rgba(248,113,113,0.4);
    background: rgba(248,113,113,0.08);
  }
  .btn-rest.cancel:hover { background: rgba(248,113,113,0.15); box-shadow: 0 0 16px rgba(248,113,113,0.15); }

  /* ── Hint row ── */
  .hint-row {
    position: relative;
    z-index: 1;
    display: flex;
    gap: 28px;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
  }

  .hint-item {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 7px;
    opacity: 0.25;
    transition: opacity 0.4s, color 0.4s;
    color: var(--muted);
  }
  .hint-item.on { opacity: 0.7; }
  .hint-item.space.on { color: #4ade80; }
  .hint-item.r-key.on { color: #fbbf24; }

  /* ── Blind mode ── */
  .blind-row {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }

  .blind-label {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .blind-opts { display: flex; gap: 4px; }

  .blind-btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 4px;
    border: 1px solid rgba(74,222,128,0.15);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s, background 0.2s;
    -webkit-app-region: no-drag;
  }
  .blind-btn:hover:not(:disabled) { border-color: rgba(74,222,128,0.3); color: #4ade80; }
  .blind-btn.active {
    color: #4ade80;
    border-color: rgba(74,222,128,0.4);
    background: rgba(74,222,128,0.08);
  }
  .blind-btn:disabled { opacity: 0.2; cursor: default; }
  .blind-btn.active:disabled { opacity: 0.65; }

  @media (max-height: 500px) {
    .title { display: none; }
  }

  .key-badge {
    padding: 2px 8px;
    border: 1px solid currentColor;
    border-radius: 4px;
    font-size: 9px;
    letter-spacing: 0.1em;
  }

  /* ── Flash overlay ── */
  .flash { position:fixed; inset:0; pointer-events:none; opacity:0; z-index:100; }
  .flash.go-green { background:rgba(74,222,128,0.07); animation:flash-anim 0.5s ease-out forwards; }
  .flash.go-amber { background:rgba(251,191,36,0.07);  animation:flash-anim 0.5s ease-out forwards; }
  @keyframes flash-anim { 0%{opacity:1;} 100%{opacity:0;} }

  /* ── Ticks ── */
  .tick-row { display:flex; width:100%; height:8px; position:relative; margin-top:-8px; }
  .tick { position:absolute; top:0; width:1px; height:6px; background:rgba(74,222,128,0.2); }

</style>
</head>
<body>

<div class="flash" id="flash"></div>

<div class="title">TIMER</div>

<div class="timer-container">

  <div class="status-row">
    <div class="status-badge ready" id="statusBadge">
      <div class="status-dot"></div>
      <span id="statusText">READY</span>
    </div>
  </div>

  <div class="time-display">
    <div class="time-main" id="timeMain">1:30</div>
    <div class="time-phase" id="timePhase">PRESS START OR SPACE</div>
  </div>

  <div class="bar-wrapper">
    <div class="segment segment-20">
      <div class="seg-bg"></div>
      <div class="seg-fill blue-20" id="fill20"></div>
    </div>
    <div class="segment segment-70">
      <div class="seg-bg"></div>
      <div class="seg-fill blue-70" id="fill70"></div>
    </div>
  </div>

  <div class="tick-row" id="tickRow"></div>

  <div class="bar-labels">
    <div class="label-20">
      <span class="label-text">Phase 1</span>
      <span class="label-time" id="labelTime1">20s</span>
    </div>
    <div class="label-70">
      <span class="label-time" id="labelTime2">70s</span>
      <span class="label-text">Phase 2</span>
    </div>
  </div>
</div>

<div class="blind-row">
  <span class="blind-label">눈먼</span>
  <div class="blind-opts">
    <button class="blind-btn active" data-mode="none">없음</button>
    <button class="blind-btn" data-mode="default">기본</button>
    <button class="blind-btn" data-mode="+1">1초월</button>
    <button class="blind-btn" data-mode="+2">2초월</button>
  </div>
</div>

<!-- Buttons -->
<div class="btn-row">
  <button class="btn btn-start" id="btnStart">
    <span>Start</span>
    <span class="btn-key">SPACE</span>
  </button>
  <button class="btn btn-rest" id="btnRest" disabled>
    <span id="btnRestLabel">Rest</span>
    <span class="btn-key">R</span>
  </button>
</div>

<div class="hint-row">
  <div class="hint-item space on" id="hintSpace">
    <span class="key-badge">SPACE</span>
    <span>start</span>
  </div>
  <div class="hint-item r-key" id="hintR">
    <span class="key-badge">R</span>
    <span id="hintRLabel">rest after cycle</span>
  </div>
</div>


<script>
  // ── State machine ─────────────────────────────────────────────
  // ready   --[START / SPACE]--> working
  // working --[REST  / R]------> rest      (timer keeps running → ready on complete)
  // rest    --[REST  / R]------> ready     (immediate reset)
  // working --[auto complete]--> working   (loop)
  // rest    --[auto complete]--> ready

  const PHASE1 = 20;
  const BLIND_SETTINGS = {
    'none':    { total: 90, phase2: 70 },
    'default': { total: 52, phase2: 32 },
    '+1':      { total: 51, phase2: 31 },
    '+2':      { total: 50, phase2: 30 },
  };
  let blindMode = 'none';
  let TOTAL = 90, PHASE2 = 70;

  let state   = 'ready';
  let elapsed = 0;
  let lastTs  = null;
  let rafId   = null;

  const fill20       = document.getElementById('fill20');
  const fill70       = document.getElementById('fill70');
  const timeMain     = document.getElementById('timeMain');
  const timePhase    = document.getElementById('timePhase');
  const flashEl      = document.getElementById('flash');
  const statusBadge  = document.getElementById('statusBadge');
  const statusText   = document.getElementById('statusText');
  const hintSpace    = document.getElementById('hintSpace');
  const hintR        = document.getElementById('hintR');
  const hintRLabel   = document.getElementById('hintRLabel');
  const btnStart     = document.getElementById('btnStart');
  const btnRest      = document.getElementById('btnRest');
  const btnRestLabel = document.getElementById('btnRestLabel');
  const labelTime1   = document.getElementById('labelTime1');
  const labelTime2   = document.getElementById('labelTime2');
  const blindBtns    = document.querySelectorAll('.blind-btn');

  // Build ticks
  const tickRow = document.getElementById('tickRow');
  for (let i = 5; i < 90; i += 5) {
    const t = document.createElement('div');
    t.className = 'tick';
    t.style.left = (i / 90 * 100) + '%';
    if (i % 10 === 0) { t.style.height = '10px'; t.style.background = 'rgba(74,222,128,0.35)'; }
    tickRow.appendChild(t);
  }

  // ── Helpers ───────────────────────────────────────────────────

  function doFlash(color) {
    flashEl.className = 'flash';
    void flashEl.offsetWidth;
    flashEl.className = 'flash go-' + color;
  }

  function setFillColor(color) {
    fill20.className = 'seg-fill ' + (color === 'blue' ? 'blue-20' : 'amber-20');
    fill70.className = 'seg-fill ' + (color === 'blue' ? 'blue-70' : 'amber-70');
  }

  function updateUI() {
    // Status badge
    statusBadge.className = 'status-badge ' + state;
    statusText.textContent = state.toUpperCase();

    // Time color
    timeMain.className = 'time-main' + (state !== 'ready' ? ' ' + state : '');

    // START button: enabled only in ready
    btnStart.disabled = (state !== 'ready');

    // REST button
    if (state === 'ready') {
      btnRest.disabled = true;
      btnRest.className = 'btn btn-rest';
      btnRestLabel.textContent = 'Rest';
    } else if (state === 'working') {
      btnRest.disabled = false;
      btnRest.className = 'btn btn-rest';
      btnRestLabel.textContent = 'Rest';
    } else { // rest
      btnRest.disabled = false;
      btnRest.className = 'btn btn-rest cancel';
      btnRestLabel.textContent = 'Cancel';
    }

    // Keyboard hints
    hintSpace.classList.toggle('on', state === 'ready');
    hintR.classList.toggle('on', state === 'working' || state === 'rest');
    if (state === 'rest') {
      hintRLabel.textContent = 'cancel rest';
      hintR.style.color = '#f87171';
    } else {
      hintRLabel.textContent = 'rest after cycle';
      hintR.style.color = '';
    }

    // Blind mode buttons: only enabled in ready
    blindBtns.forEach(btn => { btn.disabled = (state !== 'ready'); });
  }

  function formatTime(e) {
    const r = Math.ceil(Math.max(0, TOTAL - e));
    return Math.floor(r / 60) + ':' + String(r % 60).padStart(2, '0');
  }

  function renderBar(e) {
    const p1 = Math.min(e, PHASE1) / PHASE1;
    fill20.style.width = (p1 * 100) + '%';
    const p2 = e > PHASE1 ? Math.min(e - PHASE1, PHASE2) / PHASE2 : 0;
    fill70.style.width = (p2 * 100) + '%';

    fill20.classList.toggle('active', e < PHASE1 && e > 0);
    fill70.classList.toggle('active', e >= PHASE1 && e < TOTAL);

    timeMain.textContent = formatTime(e);

    if (e < PHASE1) {
      timePhase.textContent = 'PHASE 1 — ' + Math.ceil(PHASE1 - e) + 'S';
    } else if (e < TOTAL) {
      timePhase.textContent = 'PHASE 2 — ' + Math.ceil(TOTAL - e) + 'S';
    }
  }

  // ── State transitions ─────────────────────────────────────────

  function goReady() {
    if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
    state = 'ready'; elapsed = 0; lastTs = null;

    fill20.style.width = '0%'; fill70.style.width = '0%';
    fill20.classList.remove('active'); fill70.classList.remove('active');
    setFillColor('blue');

    timeMain.textContent  = formatTime(0);
    timePhase.textContent = 'PRESS START OR SPACE';

    updateUI();
    doFlash('green');
    resetBeeps();
  }

  function startTicking(fillColor) {
    setFillColor(fillColor);
    elapsed = 0; lastTs = null;
    resetBeeps();
    renderBar(0);
    if (rafId) cancelAnimationFrame(rafId);
    rafId = requestAnimationFrame(tick);
  }

  function goWorking() {
    state = 'working';
    updateUI();
    doFlash('green');
    startTicking('blue');
  }

  function goRest() {
    state = 'rest';
    setFillColor('amber');
    updateUI();
    doFlash('amber');
    // tick keeps running
  }

  function handleRestBtn() {
    if (state === 'working') goRest();
    else if (state === 'rest') goReady();
  }

  function onCycleComplete() {
    fill20.classList.remove('active');
    fill70.classList.remove('active');
    const nextState = state;
    setTimeout(() => {
      if (nextState === 'rest') goReady();
      else goWorking();
    }, 200);
  }

  // ── Tick ──────────────────────────────────────────────────────

  function tick(ts) {
    if (state === 'ready') return;
    if (lastTs === null) lastTs = ts;
    const dt = (ts - lastTs) / 1000;
    lastTs = ts;
    elapsed = Math.min(elapsed + dt, TOTAL);

    renderBar(elapsed);
    checkBeeps(elapsed);

    if (elapsed >= TOTAL) { onCycleComplete(); return; }
    rafId = requestAnimationFrame(tick);
  }

  // ── Audio ─────────────────────────────────────────────────────

  let audioCtx = null;

  function getAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }

  function beep(freq, duration, volume = 0.4) {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    gain.gain.setValueAtTime(volume, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + duration);
  }

  let firedBeeps = new Set();

  function checkBeeps(e) {
    const end = TOTAL;
    const times = [16, 17, 18, 19, 20, end-4, end-3, end-2, end-1, end];
    for (const bt of times) {
      if (!firedBeeps.has(bt) && e >= bt) {
        firedBeeps.add(bt);
        const isLast = (bt === 20 || bt === end);
        beep(isLast ? 880 : 660, isLast ? 0.45 : 0.12, isLast ? 0.5 : 0.35);
      }
    }
  }

  function resetBeeps() { firedBeeps = new Set(); }

  // ── Input ─────────────────────────────────────────────────────

  document.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
      e.preventDefault();
      if (state === 'ready') goWorking();
    }
    if (e.key === 'r' || e.key === 'R') {
      handleRestBtn();
    }
  });

  btnStart.addEventListener('click', () => { if (state === 'ready') goWorking(); });
  btnRest.addEventListener('click',  () => handleRestBtn());

  // ── Blind mode ────────────────────────────────────────────────

  function setBlindMode(mode) {
    if (state !== 'ready') return;
    blindMode = mode;
    TOTAL  = BLIND_SETTINGS[mode].total;
    PHASE2 = BLIND_SETTINGS[mode].phase2;
    blindBtns.forEach(btn => btn.classList.toggle('active', btn.dataset.mode === mode));
    labelTime2.textContent = PHASE2 + 's';
    timeMain.textContent = formatTime(0);
  }

  blindBtns.forEach(btn => {
    btn.addEventListener('click', () => setBlindMode(btn.dataset.mode));
  });


  // Register service worker for offline/standalone support
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }

  // ── Init ──────────────────────────────────────────────────────
  state = 'ready';
  updateUI();
</script>
